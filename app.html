            )}

            {/* Patient Information */}
            {selectedService && bookingData.date && bookingData.time && (
              <div className="bg-white rounded-xl shadow-lg p-8 mb-8">
                <h2 className="text-2xl font-bold mb-6 text-gray-800 flex items-center">
                  <div className="w-6 h-6 mr-2 text-blue-600"><User /></div>
                  Your Information
                </h2>
                
                <div className="grid md:grid-cols-2 gap-6">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">
                      Full Name
                    </label>
                    <input 
                      type="text"
                      placeholder="John Doe"
                      className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">
                      Phone Number
                    </label>
                    <input 
                      type="tel"
                      placeholder="+254 700 000 000"
                      className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">
                      Email Address
                    </label>
                    <input 
                      type="email"
                      placeholder="john@example.com"
                      className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">
                      Insurance Provider (Optional)
                    </label>
                    <input 
                      type="text"
                      placeholder="NHIF, AAR, etc."
                      className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    />
                  </div>
                </div>

                <div className="mt-6">
                  <label className="block text-sm font-medium text-gray-700 mb-2">
                    Special Requirements (Optional)
                  </label>
                  <textarea 
                    rows="3"
                    placeholder="Any special needs or preferences we should know about?"
                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                  />
                </div>

                <button 
                  onClick={() => setCurrentView('confirmation')}
                  className="w-full mt-8 bg-gradient-to-r from-blue-600 to-teal-600 text-white py-4 rounded-lg font-bold text-lg hover:shadow-xl transition-all transform hover:scale-105"
                >
                  Confirm Booking
                </button>
              </div>
            )}
          </div>
        </div>
      );

      const ConfirmationPage = () => (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-teal-50 flex items-center justify-center px-6">
          <div className="max-w-2xl w-full">
            <div className="bg-white rounded-2xl shadow-2xl p-12 text-center">
              <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <div className="w-12 h-12 text-green-600"><CheckCircle /></div>
              </div>
              
              <h1 className="text-4xl font-bold text-gray-800 mb-4">
                Booking Confirmed!
              </h1>
              
              <p className="text-xl text-gray-600 mb-8">
                Your dialysis session has been scheduled
              </p>

              <div className="bg-gradient-to-r from-blue-50 to-teal-50 rounded-xl p-8 mb-8">
                <div className="grid grid-cols-2 gap-6 text-left">
                  <div>
                    <p className="text-sm text-gray-600 mb-1">Service</p>
                    <p className="font-bold text-gray-800">
                      {services.find(s => s.id === selectedService)?.name}
                    </p>
                  </div>
                  <div>
                    <p className="text-sm text-gray-600 mb-1">Price</p>
                    <p className="font-bold text-gray-800">
                      {services.find(s => s.id === selectedService)?.price}
                    </p>
                  </div>
                  <div>
                    <p className="text-sm text-gray-600 mb-1">Date</p>
                    <p className="font-bold text-gray-800">{bookingData.date}</p>
                  </div>
                  <div>
                    <p className="text-sm text-gray-600 mb-1">Time</p>
                    <p className="font-bold text-gray-800">{bookingData.time}</p>
                  </div>
                </div>
              </div>

              <div className="bg-blue-50 border-l-4 border-blue-600 p-6 mb-8 text-left">
                <h3 className="font-bold text-gray-800 mb-2">What's Next?</h3>
                <ul className="text-sm text-gray-700 space-y-2">
                  <li>✓ You'll receive a confirmation SMS and email shortly</li>
                  <li>✓ Our care team will call you within 24 hours</li>
                  <li>✓ For Premium Care: Pickup details will be coordinated</li>
                  <li>✓ Feel free to reach us anytime on WhatsApp</li>
                </ul>
              </div>

              <div className="flex gap-4">
                <button 
                  onClick={() => {
                    setCurrentView('home');
                    setSelectedService(null);
                    setBookingData({date: '', time: '', service: ''});
                  }}
                  className="flex-1 bg-gradient-to-r from-blue-600 to-teal-600 text-white py-4 rounded-lg font-bold hover:shadow-xl transition-all"
                >
                  Back to Home
                </button>
                <button 
                  className="flex-1 border-2 border-blue-600 text-blue-600 py-4 rounded-lg font-bold hover:bg-blue-50 transition-all"
                >
                  Add to Calendar
                </button>
              </div>
            </div>
          </div>
        </div>
      );

      return (
        <div>
          {currentView === 'home' && <HomePage />}
          {currentView === 'booking' && <BookingPage />}
          {currentView === 'confirmation' && <ConfirmationPage />}
        </div>
      );
    };

    ReactDOM.render(<DialysisBookingApp />, document.getElementById('root'));
  </script>
</body>
</html>
